{{define "base"}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | Launchly</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { sans:['Inter','sans-serif'], display:['Fraunces','serif'] }, colors: { brand:{DEFAULT:'#4F46E5',dark:'#3730A3'} } } } }
  </script>
  <style>body{font-family:'Inter',sans-serif;}</style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased min-h-screen">
  <header class="border-b border-slate-100 sticky top-0 z-40 bg-white/90 backdrop-blur">
    <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
      <a href="/" class="font-display text-xl font-bold text-slate-900">Launchly</a>
      <nav class="hidden md:flex items-center gap-8 text-sm font-medium text-slate-600">
        <a href="/dashboard" class="hover:text-slate-900">Sites</a>
        <a href="/dashboard/account" class="hover:text-slate-900">Account</a>
        <a href="/logout" class="hover:text-slate-900">Log out</a>
      </nav>
      <div class="flex items-center gap-3">
        <a href="/dashboard/sites/new" class="hidden sm:inline-flex items-center rounded-full bg-brand px-5 py-2 text-sm font-semibold text-white hover:bg-brand-dark transition">+ New site</a>
        <button type="button" id="nav-toggle" aria-expanded="false" aria-controls="mobile-nav" aria-label="Open menu" class="md:hidden inline-flex items-center justify-center rounded-lg p-2 text-slate-600 hover:bg-slate-100">
          <svg id="nav-toggle-open" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
          <svg id="nav-toggle-close" xmlns="http://www.w3.org/2000/svg" class="hidden h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
    </div>
    <nav id="mobile-nav" class="hidden md:hidden border-t border-slate-100 px-6 py-4 flex flex-col gap-4 text-sm font-medium text-slate-600">
      <a href="/dashboard" class="hover:text-slate-900">Sites</a>
      <a href="/dashboard/account" class="hover:text-slate-900">Account</a>
      <a href="/logout" class="hover:text-slate-900">Log out</a>
      <a href="/dashboard/sites/new" class="inline-flex items-center justify-center rounded-full bg-brand px-5 py-2 text-sm font-semibold text-white hover:bg-brand-dark transition sm:hidden">+ New site</a>
    </nav>
  </header>
  <script>
  (function(){
    var btn = document.getElementById('nav-toggle');
    var panel = document.getElementById('mobile-nav');
    if (!btn || !panel) return;
    var openIcon = document.getElementById('nav-toggle-open');
    var closeIcon = document.getElementById('nav-toggle-close');
    btn.addEventListener('click', function(){
      var isOpen = !panel.classList.contains('hidden');
      panel.classList.toggle('hidden');
      openIcon.classList.toggle('hidden');
      closeIcon.classList.toggle('hidden');
      btn.setAttribute('aria-expanded', String(!isOpen));
    });
  })();
  </script>
  {{if not .EmailVerified}}
  <div class="max-w-5xl mx-auto px-6 mt-6">
    <p class="rounded-lg bg-amber-50 text-amber-700 text-sm px-4 py-3">
      Please confirm your email address. <a href="/resend-verification" class="font-medium underline">Resend verification email</a>
    </p>
  </div>
  {{end}}
  {{if .Flash}}
  <div class="max-w-5xl mx-auto px-6 mt-6">
    <p class="rounded-lg bg-emerald-50 text-emerald-700 text-sm px-4 py-3">{{.Flash}}</p>
  </div>
  {{end}}
  <main class="max-w-5xl mx-auto px-6 py-10">
    {{template "content" .}}
  </main>
</body>
</html>
{{end}}
