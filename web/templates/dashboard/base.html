{{define "base"}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | Launchly</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { sans:['Inter','sans-serif'], display:['Fraunces','serif'] }, colors: { brand:{DEFAULT:'#4F46E5',dark:'#3730A3'} } } } }
  </script>
  <style>body{font-family:'Inter',sans-serif;}</style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased min-h-screen">
  <header class="bg-white border-b border-slate-200">
    <div class="max-w-5xl mx-auto px-6 h-16 flex items-center justify-between">
      <a href="/" class="font-display text-lg font-bold text-slate-900">Launchly</a>
      <nav class="flex items-center gap-6 text-sm font-medium text-slate-600">
        <a href="/dashboard" class="hover:text-slate-900">Sites</a>
        <a href="/dashboard/account" class="hover:text-slate-900">Account</a>
        <a href="/logout" class="hover:text-slate-900">Log out</a>
      </nav>
    </div>
  </header>
  {{if not .EmailVerified}}
  <div class="max-w-5xl mx-auto px-6 mt-6">
    <p class="rounded-lg bg-amber-50 text-amber-700 text-sm px-4 py-3">
      Please confirm your email address. <a href="/resend-verification" class="font-medium underline">Resend verification email</a>
    </p>
  </div>
  {{end}}
  {{if .Flash}}
  <div class="max-w-5xl mx-auto px-6 mt-6">
    <p class="rounded-lg bg-emerald-50 text-emerald-700 text-sm px-4 py-3">{{.Flash}}</p>
  </div>
  {{end}}
  <main class="max-w-5xl mx-auto px-6 py-10">
    {{template "content" .}}
  </main>
</body>
</html>
{{end}}
