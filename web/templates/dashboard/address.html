{{define "content"}}
<a href="/dashboard/sites/{{.Site.ID}}" class="text-sm text-slate-500 hover:text-slate-800">← Back</a>
<h1 class="font-display text-2xl font-bold text-slate-900 mt-2">Address</h1>
<p class="mt-2 text-slate-500">Your site is live at <a href="{{.SiteURL}}" target="_blank" class="text-brand font-medium">{{.SiteURL}} ↗</a></p>

{{if .Flash}}<p class="mt-4 rounded-lg bg-emerald-50 text-emerald-700 text-sm px-4 py-3">{{.Flash}}</p>{{end}}
{{if .Error}}<p class="mt-4 rounded-lg bg-red-50 text-red-700 text-sm px-4 py-3">{{.Error}}</p>{{end}}

<form method="POST" action="/dashboard/sites/{{.Site.ID}}/address" class="mt-8 space-y-4 max-w-md">
  <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
  <div>
    <label class="block text-sm font-medium text-slate-700 mb-1">Subdomain</label>
    <div class="flex items-center rounded-lg border border-slate-200 focus-within:ring-2 focus-within:ring-brand">
      <input type="text" name="slug" value="{{if .Slug}}{{.Slug}}{{else}}{{.Site.Slug}}{{end}}" required
             class="flex-1 min-w-0 rounded-l-lg px-4 py-2.5 focus:outline-none">
      <span class="pr-4 text-sm text-slate-400 whitespace-nowrap">.{{.Domain}}</span>
    </div>
    <p class="mt-1 text-xs text-slate-400">Your old link will keep working — it'll redirect here automatically. You can change this once per day.</p>
  </div>
  <button type="submit" class="rounded-full bg-brand px-6 py-3 font-semibold text-white hover:bg-brand-dark transition">Save address</button>
</form>
{{end}}
