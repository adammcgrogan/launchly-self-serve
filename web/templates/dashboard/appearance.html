{{define "content"}}
<a href="/dashboard/sites/{{.Site.ID}}" class="text-sm text-slate-500 hover:text-slate-800">← Back</a>
<h1 class="font-display text-2xl font-bold text-slate-900 mt-2">Appearance</h1>

<form method="POST" action="/dashboard/sites/{{.Site.ID}}/appearance" class="mt-8 space-y-8">
  <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">

  <section>
    <h2 class="font-semibold text-slate-900 mb-4">Colour palette</h2>
    <div class="grid sm:grid-cols-2 gap-4">
      {{range .Palettes}}
      <label class="flex items-center gap-3 rounded-2xl border border-slate-200 p-4 cursor-pointer has-[:checked]:border-brand has-[:checked]:ring-2 has-[:checked]:ring-brand/20">
        <input type="radio" name="palette" value="{{.ID}}" {{if eq .ID $.Site.Palette}}checked{{end}}>
        <span class="font-medium text-slate-900">{{.Name}}</span>
      </label>
      {{end}}
    </div>
  </section>

  <section>
    <h2 class="font-semibold text-slate-900 mb-4">Heading font</h2>
    <select name="heading_font" class="w-full rounded-lg border border-slate-200 px-4 py-2.5">
      <option value="" {{if eq .Site.HeadingFont ""}}selected{{end}}>Design default</option>
      <option value="sans" {{if eq .Site.HeadingFont "sans"}}selected{{end}}>Sans-serif</option>
      <option value="serif" {{if eq .Site.HeadingFont "serif"}}selected{{end}}>Serif</option>
    </select>
  </section>

  <button type="submit" class="w-full rounded-full bg-brand px-6 py-4 font-semibold text-white hover:bg-brand-dark transition">Save appearance</button>
</form>
{{end}}
