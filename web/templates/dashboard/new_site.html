{{define "content"}}
<h1 class="font-display text-2xl font-bold text-slate-900">Build your site</h1>
<p class="mt-2 text-slate-500">Fill this in and your site goes live immediately — no review, no waiting.</p>

{{if .Error}}<p class="mt-4 rounded-lg bg-red-50 text-red-700 text-sm px-4 py-3">{{.Error}}</p>{{end}}

<form method="POST" action="/dashboard/sites/new" class="mt-8 space-y-10">
  <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">

  <section>
    <h2 class="font-semibold text-slate-900 mb-4">Choose a design</h2>
    <div class="grid sm:grid-cols-2 gap-4">
      {{range $i, $t := .Templates}}
      <label class="flex items-start gap-3 rounded-2xl border border-slate-200 p-5 cursor-pointer has-[:checked]:border-brand has-[:checked]:ring-2 has-[:checked]:ring-brand/20">
        <input type="radio" name="template_id" value="{{$t.ID}}" {{if eq $i 0}}checked{{end}} class="mt-1">
        <span>
          <span class="block font-semibold text-slate-900">{{$t.Name}}</span>
          <span class="block text-sm text-slate-500 mt-1">{{$t.Description}}</span>
        </span>
      </label>
      {{end}}
    </div>
  </section>

  <section class="space-y-4">
    <h2 class="font-semibold text-slate-900">Business details</h2>
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">Business name</label>
      <input type="text" name="business_name" required class="w-full rounded-lg border border-slate-200 px-4 py-2.5">
    </div>
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">Tagline</label>
      <input type="text" name="tagline" placeholder="e.g. Quality work, done right" class="w-full rounded-lg border border-slate-200 px-4 py-2.5">
    </div>
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">About</label>
      <textarea name="about" rows="4" class="w-full rounded-lg border border-slate-200 px-4 py-2.5"></textarea>
    </div>
    <div class="grid sm:grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Logo URL</label>
        <input type="url" name="logo_url" class="w-full rounded-lg border border-slate-200 px-4 py-2.5">
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Call-to-action button text</label>
        <input type="text" name="cta_text" placeholder="Get a Quote" class="w-full rounded-lg border border-slate-200 px-4 py-2.5">
      </div>
    </div>
  </section>

  <section class="space-y-4">
    <h2 class="font-semibold text-slate-900">Contact</h2>
    <div class="grid sm:grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Phone</label>
        <input type="tel" name="phone" class="w-full rounded-lg border border-slate-200 px-4 py-2.5">
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Public email</label>
        <input type="email" name="email" class="w-full rounded-lg border border-slate-200 px-4 py-2.5">
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Address</label>
        <input type="text" name="address" class="w-full rounded-lg border border-slate-200 px-4 py-2.5">
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Location badge</label>
        <input type="text" name="location" placeholder="e.g. Belfast, NI" class="w-full rounded-lg border border-slate-200 px-4 py-2.5">
      </div>
    </div>
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">Google Maps embed URL (optional)</label>
      <input type="url" name="map_embed_url" class="w-full rounded-lg border border-slate-200 px-4 py-2.5">
    </div>
  </section>

  <section class="space-y-4">
    <h2 class="font-semibold text-slate-900">Content</h2>
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">Services — one per line</label>
      <textarea name="services" rows="4" placeholder="Boiler repair&#10;Central heating installs&#10;Landlord safety certificates" class="w-full rounded-lg border border-slate-200 px-4 py-2.5"></textarea>
    </div>
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">Certifications / trust badges — one per line</label>
      <textarea name="certifications" rows="2" class="w-full rounded-lg border border-slate-200 px-4 py-2.5"></textarea>
    </div>
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">Testimonials — one per line, "Name|Role|Quote"</label>
      <textarea name="testimonials" rows="3" placeholder="Jane Doe|Homeowner|Brilliant service, highly recommend." class="w-full rounded-lg border border-slate-200 px-4 py-2.5"></textarea>
    </div>
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">Gallery image URLs — one per line</label>
      <textarea name="gallery" rows="3" class="w-full rounded-lg border border-slate-200 px-4 py-2.5"></textarea>
    </div>
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">Opening hours — one per line, "Label|Hours"</label>
      <textarea name="hours" rows="2" placeholder="Mon-Fri|9am-5pm" class="w-full rounded-lg border border-slate-200 px-4 py-2.5"></textarea>
    </div>
  </section>

  <section class="space-y-4">
    <h2 class="font-semibold text-slate-900">Social links</h2>
    <div class="grid sm:grid-cols-2 gap-4">
      <input type="url" name="facebook_url" placeholder="Facebook URL" class="w-full rounded-lg border border-slate-200 px-4 py-2.5">
      <input type="url" name="instagram_url" placeholder="Instagram URL" class="w-full rounded-lg border border-slate-200 px-4 py-2.5">
      <input type="url" name="whatsapp_url" placeholder="WhatsApp link" class="w-full rounded-lg border border-slate-200 px-4 py-2.5">
      <input type="url" name="twitter_url" placeholder="X / Twitter URL" class="w-full rounded-lg border border-slate-200 px-4 py-2.5">
      <input type="url" name="tiktok_url" placeholder="TikTok URL" class="w-full rounded-lg border border-slate-200 px-4 py-2.5">
      <input type="url" name="linkedin_url" placeholder="LinkedIn URL" class="w-full rounded-lg border border-slate-200 px-4 py-2.5">
    </div>
  </section>

  <button type="submit" class="w-full rounded-full bg-brand px-6 py-4 font-semibold text-white hover:bg-brand-dark transition">Publish my site</button>
</form>
{{end}}
