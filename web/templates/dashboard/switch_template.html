{{define "content"}}
<a href="/dashboard/sites/{{.Site.ID}}" class="text-sm text-slate-500 hover:text-slate-800">← Back</a>
<h1 class="font-display text-2xl font-bold text-slate-900 mt-2">Switch design</h1>
<p class="mt-2 text-slate-500">Your content carries over. Nothing is lost when you switch.</p>

<form method="POST" action="/dashboard/sites/{{.Site.ID}}/switch-template" class="mt-8 space-y-8">
  <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
  <div class="grid sm:grid-cols-2 gap-4">
    {{range .Templates}}
    <label class="flex items-start gap-3 rounded-2xl border border-slate-200 p-5 cursor-pointer has-[:checked]:border-brand has-[:checked]:ring-2 has-[:checked]:ring-brand/20">
      <input type="radio" name="template_id" value="{{.ID}}" {{if eq .ID $.Site.TemplateID}}checked{{end}} class="mt-1">
      <span>
        <span class="block font-semibold text-slate-900">{{.Name}}</span>
        <span class="block text-sm text-slate-500 mt-1">{{.Description}}</span>
      </span>
    </label>
    {{end}}
  </div>
  <button type="submit" class="w-full rounded-full bg-brand px-6 py-4 font-semibold text-white hover:bg-brand-dark transition">Switch design</button>
</form>
{{end}}
