{{define "content"}}
<div class="flex items-center justify-between mb-8">
  <h1 class="font-display text-2xl font-bold text-slate-900">Your sites</h1>
  <a href="/dashboard/sites/new" class="inline-flex items-center rounded-full bg-brand px-5 py-2.5 text-sm font-semibold text-white hover:bg-brand-dark transition">+ New site</a>
</div>

{{if not .Sites}}
<div class="rounded-2xl border border-dashed border-slate-300 p-16 text-center">
  <p class="font-display text-xl font-semibold text-slate-900">No sites yet</p>
  <p class="mt-2 text-slate-500">Build your first site — it'll be live the moment you finish.</p>
  <a href="/dashboard/sites/new" class="mt-6 inline-flex items-center rounded-full bg-brand px-6 py-3 text-sm font-semibold text-white hover:bg-brand-dark transition">Build a site</a>
</div>
{{else}}
<div class="grid gap-4">
  {{range .Sites}}
  <a href="/dashboard/sites/{{.ID}}" class="flex items-center justify-between rounded-2xl border border-slate-200 bg-white p-6 hover:border-slate-300 transition">
    <div>
      <p class="font-semibold text-slate-900">{{.BusinessName}}</p>
      <p class="text-sm text-slate-500 mt-1">{{.Slug}}.launchly.ltd</p>
    </div>
    <span class="text-xs font-semibold uppercase tracking-wide px-3 py-1 rounded-full {{if eq (print .Status) "live"}}bg-emerald-50 text-emerald-700{{else}}bg-slate-100 text-slate-500{{end}}">{{.Status}}</span>
  </a>
  {{end}}
</div>
{{end}}
{{end}}
