{{define "content"}}
<div class="max-w-md mx-auto text-center py-6">
  {{if .Error}}
  <div class="rounded-2xl border border-slate-200 bg-white p-8">
    <h1 class="font-display text-2xl font-bold text-slate-900">Invite not found</h1>
    <p class="mt-2 text-slate-500">{{.Error}}</p>
    <a href="/dashboard" class="mt-6 inline-block text-sm font-medium text-brand">Go to your dashboard →</a>
  </div>
  {{else}}
  <div class="rounded-2xl border border-slate-200 bg-white p-8">
    <h1 class="font-display text-2xl font-bold text-slate-900">Join {{.Site.BusinessName}}</h1>
    <p class="mt-2 text-slate-500">You've been invited to help manage <strong>{{.Site.BusinessName}}</strong>'s website — you'll be able to view leads and edit site content.</p>
    <form method="POST" action="/dashboard/invites/{{.Invite.InviteToken}}/accept" class="mt-6">
      <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
      <button type="submit" class="w-full rounded-full bg-brand px-6 py-3 text-sm font-semibold text-white hover:bg-brand-dark transition">Accept invite</button>
    </form>
  </div>
  {{end}}
</div>
{{end}}
