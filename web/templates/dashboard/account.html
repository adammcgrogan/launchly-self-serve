{{define "content"}}
<h1 class="font-display text-2xl font-bold text-slate-900">Account</h1>

<div class="mt-8 rounded-2xl border border-slate-200 bg-white p-6 max-w-md">
  <p class="text-sm text-slate-500">Email</p>
  <p class="mt-1 font-medium text-slate-900">{{.Profile.Email}}</p>

  <div class="mt-6 pt-6 border-t border-slate-100">
    <p class="text-sm text-slate-500">Need to change your password?</p>
    <a href="/forgot-password" class="mt-2 inline-flex text-sm font-medium text-brand">Send a reset link</a>
  </div>

  <div class="mt-6 pt-6 border-t border-slate-100">
    <a href="/logout" class="inline-flex rounded-full border border-slate-200 px-5 py-2.5 text-sm font-medium hover:border-slate-300">Log out</a>
  </div>
</div>
{{end}}
