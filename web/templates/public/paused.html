{{define "content"}}
<section class="max-w-lg mx-auto px-6 pt-32 pb-32 text-center">
  <p class="font-display text-2xl font-bold text-brand">{{.BusinessName}}</p>
  <h1 class="mt-4 font-display text-2xl font-bold text-slate-900">This site is taking a break</h1>
  <p class="mt-3 text-slate-600">It's paused right now and not accepting visitors. Check back soon — or if this is your business, log in to reactivate it in one click.</p>
  <a href="/login" class="mt-8 inline-flex items-center rounded-full bg-brand px-6 py-3 text-sm font-semibold text-white hover:bg-brand-dark transition">Owner? Log in</a>
</section>
{{end}}
