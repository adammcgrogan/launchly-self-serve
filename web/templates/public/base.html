{{define "base"}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Launchly | Build your own business website, live in minutes</title>
  <meta name="description" content="Sign up, build your site, and go live instantly. No approval, no waiting. A self-serve website builder for local businesses.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { fontFamily: {
      sans: ['Inter','-apple-system','sans-serif'], display: ['Fraunces','serif']
    }, colors: { brand: { DEFAULT:'#4F46E5', dark:'#3730A3' }, amber: { DEFAULT:'#F59E0B' } } } } }
  </script>
  <style>body{font-family:'Inter',sans-serif;}</style>
</head>
<body class="bg-white text-slate-900 antialiased">
  <header class="border-b border-slate-100 sticky top-0 z-40 bg-white/90 backdrop-blur">
    <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
      <a href="/" class="font-display text-xl font-bold text-slate-900">Launchly</a>
      <nav class="hidden md:flex items-center gap-8 text-sm font-medium text-slate-600">
        <a href="/templates" class="hover:text-slate-900">Templates</a>
        <a href="/pricing" class="hover:text-slate-900">Pricing</a>
        <a href="/login" class="hover:text-slate-900">Log in</a>
      </nav>
      <a href="/signup" class="inline-flex items-center rounded-full bg-brand px-5 py-2 text-sm font-semibold text-white hover:bg-brand-dark transition">Start free</a>
    </div>
  </header>
  <main>
    {{template "content" .}}
  </main>
  <footer class="border-t border-slate-100 mt-24">
    <div class="max-w-6xl mx-auto px-6 py-12 flex flex-col sm:flex-row items-center justify-between gap-4 text-sm text-slate-500">
      <p>&copy; Launchly. Build your business a home online.</p>
      <div class="flex items-center gap-6">
        <a href="/privacy" class="hover:text-slate-800">Privacy</a>
        <a href="/terms" class="hover:text-slate-800">Terms</a>
      </div>
    </div>
  </footer>
</body>
</html>
{{end}}
