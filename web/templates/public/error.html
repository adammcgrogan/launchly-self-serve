{{define "content"}}
<section class="max-w-lg mx-auto px-6 pt-32 pb-32 text-center">
  <p class="font-display text-6xl font-bold text-brand">{{.Status}}</p>
  <h1 class="mt-4 font-display text-2xl font-bold text-slate-900">
    {{if eq .Status 404}}Page not found{{else}}Something went wrong{{end}}
  </h1>
  <p class="mt-3 text-slate-600">
    {{if eq .Status 404}}The page you're looking for doesn't exist or may have moved.{{else}}We hit a snag on our end — please try again in a moment.{{end}}
  </p>
  <a href="/" class="mt-8 inline-flex items-center rounded-full bg-brand px-6 py-3 text-sm font-semibold text-white hover:bg-brand-dark transition">Back home</a>
</section>
{{end}}
