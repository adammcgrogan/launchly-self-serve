{{define "content"}}
<div class="bg-white rounded-2xl border border-slate-200 p-8">
  <h1 class="font-display text-2xl font-bold text-slate-900">Set a new password</h1>

  {{if .Error}}<p class="mt-4 rounded-lg bg-red-50 text-red-700 text-sm px-4 py-3">{{.Error}}</p>{{end}}
  <p id="link-warning" class="hidden mt-4 rounded-lg bg-red-50 text-red-700 text-sm px-4 py-3">This reset link is invalid or has expired — request a new one.</p>

  <form id="reset-form" method="POST" action="/reset-password" class="mt-6 space-y-4">
    <input type="hidden" name="access_token" id="access_token">
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">New password</label>
      <input type="password" name="password" required minlength="8" class="w-full rounded-lg border border-slate-200 px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-brand">
    </div>
    <button type="submit" class="w-full rounded-lg bg-brand px-6 py-3 font-semibold text-white hover:bg-brand-dark transition">Update password</button>
  </form>
</div>
<script>
  // Supabase's recovery email link redirects here with the token in the URL
  // fragment (after '#'), which never reaches the server — so we read it
  // client-side and carry it into the form as a hidden field.
  (function () {
    var params = new URLSearchParams(window.location.hash.replace(/^#/, ''));
    var token = params.get('access_token');
    if (token) {
      document.getElementById('access_token').value = token;
    } else {
      document.getElementById('reset-form').classList.add('hidden');
      document.getElementById('link-warning').classList.remove('hidden');
    }
  })();
</script>
{{end}}
